[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "parquet_nfs_db_cache"
version = "0.1.0"
description = "parquet_nfs_db_cache"
readme = "README.md"
requires-python = ">=3.13,<3.14"

dependencies = [
  "numpy>=2.4,<3",
  "polars>=1.38.1,<2",
  "pyarrow>=23.0.1",
  "matplotlib",
  "pyarrow>=23.0.0",
  "psutil>=7.2.2",
]

[tool.hatch.build.targets.wheel]
packages = ["nfs_cache"]

